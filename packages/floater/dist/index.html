<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mavis-pet</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0; padding: 0;
        width: 100vw; height: 100vh;
        background: transparent !important;
        overflow: hidden;
        cursor: grab;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
      }
      body:active { cursor: grabbing; }
      .stage {
        position: relative;
        width: 100%; height: 100%;
        background: transparent;
        /* IMPORTANT: must be `visible`, not `hidden`. The chevron toggle
         * sits at top:-6 right:-10 relative to .pet-host (overlapping the
         * top-right corner of the pet sprite), which means part of it
         * extends OUTSIDE .pet-host on the top and right. With
         * overflow:hidden the chevron gets clipped to nothing.
         * v0.6.1 — also needed by the cards-stack for overlapping shadow
         * and fade-out animations that briefly extend past their bounds. */
        overflow: visible;
        /* v0.6.1 layout swap:
         *   row 1 = cards stack (top → grows up)
         *   row 2 = pet sprite + toggle (bottom-right anchor)
         *
         * Vino's spec: cards stack ABOVE the pet, not below.
         * grid-template-rows: cards row stretches to fill, pet row hugs content.
         * align-items: end keeps cards anchored to bottom (closest to pet),
         * additional cards push UP — which is what we want when adding new
         * sessions (newest pushes existing cards higher).
         */
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 6px;
        padding: 4px 8px 8px 8px;
        box-sizing: border-box;
      }

      /* ---- v0.6.1 cards stack (row 1) ---- */
      .cards-stack {
        align-self: end;
        justify-self: end;
        display: flex;
        flex-direction: column;
        gap: 6px;
        /* v0.6.1.1 — fixed width (was max-content with max-cap, but that
         * made each card breathe to its own content length and the column
         * visually jittered card-to-card / between renders. Vino noticed.
         * Lock to 320px so the stack reads as one consistent column. */
        width: 320px;
        max-height: 100%;
        overflow: visible;
        pointer-events: auto;
      }

      /* Each individual session card. Renders agentName/title (bold one
       * line) + currentAction OR lastMessage (subtle two-line clamp). */
      .card {
        background: #ffffff;
        color: #1a1a1a;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 2px 8px rgba(0, 0, 0, 0.05);
        padding: 8px 10px 9px 10px;
        font-size: 13px;
        line-height: 1.3;
        cursor: pointer;
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 300ms ease-out, transform 300ms ease-out;
        /* v0.6.1.1 — fixed width on parent .cards-stack, individual cards
         * fill 100% of stack so the column reads consistent. */
        width: 100%;
        box-sizing: border-box;
        pointer-events: auto;
      }
      .card.show {
        opacity: 1;
        transform: translateY(0);
      }
      /* Removal animation — apply .leaving briefly before unmount. */
      .card.leaving {
        opacity: 0;
        transform: translateY(-4px);
      }
      .card:hover {
        background: #f8fafd;
        border-color: rgba(0, 0, 0, 0.12);
      }
      .card.finished {
        /* v0.6.1.1 — was opacity:0.78 but that made the whole card blend
         * with the desktop bg (vino noticed the bottom transparent halo).
         * Keep card fully opaque; convey "finished" via the green check
         * icon + slightly muted title color. */
        color: #4a4a4a;
      }
      .card.finished .card-title { color: #4a4a4a; }
      .card.finished:hover { color: #1a1a1a; }
      .card.finished:hover .card-title { color: #1a1a1a; }
      /* v0.6.1 (Bug 2) — waiting_perm visual cue: amber left border +
       * darker background tint. Catches the user's eye so they notice
       * "this session is blocked on me". */
      .card.waiting-perm {
        border-left: 3px solid #ff8c21;
        background: linear-gradient(90deg, #fff8ee 0%, #ffffff 14%);
        padding-left: 8px;
      }

      .card-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      /* v0.7.2 — restored from v0.4.4 design. 22x22 rounded-square logo
       * tile (mavis app icon) at the left of each card title. Anchors
       * the card visually + makes it instantly recognizable as a mavis
       * task card vs anything else on the desktop. v0.6.1 multi-card
       * rewrite accidentally dropped this slot when the row was
       * simplified to [title, icon-slot] — vino noticed and asked
       * for it back. */
      .card-badge {
        flex: 0 0 22px;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background-image: url("badge.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .card-title {
        flex: 1 1 auto;
        min-width: 0;
        font-size: 13px;
        line-height: 1.25;
        font-weight: 700;
        color: #1a1a1a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-icon {
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .card-icon svg { display: block; }
      .card .card-spinner {
        width: 12px;
        height: 12px;
        border: 1.5px solid rgba(0, 0, 0, 0.15);
        border-top-color: #1a1a1a;
        border-radius: 50%;
        animation: card-spin 0.9s linear infinite;
      }
      @keyframes card-spin { to { transform: rotate(360deg); } }
      .card .card-clock { color: #ff8c21; }   /* amber for waiting_perm */
      .card .card-check { color: #34c759; }   /* iOS green for finished */

      .card-subtitle {
        margin-top: 3px;
        font-size: 12px;
        line-height: 1.35;
        color: #555555;
        font-weight: 400;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        word-break: break-word;
      }
      .card-subtitle:empty { display: none; margin: 0; }

      @media (prefers-color-scheme: dark) {
        .card { background: #ffffff; color: #1a1a1a; }
      }

      /* ---- v0.4.2 layout: boba TOP-RIGHT, card RIGHT BELOW ---- */

      /* Pet container: holds the sprite + the toggle (chevron / badge).
       * v0.6.1: row 2 (bottom). justify-self: end keeps pet at bottom-right.
       */
      .pet-host {
        position: relative;
        justify-self: end;
        align-self: end;
        width: auto;
        height: auto;
      }
      .pet {
        position: relative;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        will-change: background-position;
        pointer-events: auto;
      }

      /* Toggle handle in pet's top-right corner. Two skins switched by
       * .collapsed class on .pet-host:
       *   - collapsed=false  →  small ⌄ chevron (means "click to collapse")
       *   - collapsed=true   →  pale-blue ① badge (means "N tasks; click to expand")
       * Hidden entirely when there are no active sessions. */
      .pet-toggle {
        position: absolute;
        top: -4px;
        right: -4px;
        width: 22px;
        min-width: 22px;
        height: 22px;
        padding: 0;
        border-radius: 11px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        background: #ffffff;
        color: #333333;
        border: none;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06),
                    0 2px 6px rgba(0, 0, 0, 0.05),
                    0 0 0 0.5px rgba(0, 0, 0, 0.08);
        cursor: pointer;
        pointer-events: auto;
        z-index: 10;
        transition: background 120ms ease-out, transform 120ms ease-out;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      }
      .pet-toggle:hover { background: #f3f6fb; transform: scale(1.05); }
      .pet-toggle:active { transform: scale(0.92); }
      .pet-host.has-tasks .pet-toggle { display: inline-flex; }
      .pet-toggle .pet-toggle-chevron { display: block; }
      .pet-toggle .pet-toggle-count { display: none; font-size: 12px; font-weight: 600; line-height: 1; }
      .pet-host.collapsed .pet-toggle .pet-toggle-chevron { display: none; }
      .pet-host.collapsed .pet-toggle .pet-toggle-count { display: inline; }
      .pet-host.collapsed .pet-toggle {
        background: #4a90e2;
        color: #ffffff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08),
                    0 2px 6px rgba(74, 144, 226, 0.18),
                    0 0 0 0.5px rgba(255, 255, 255, 0.4) inset;
      }
      .pet-host.collapsed .pet-toggle:hover { background: #3a7fd0; }
      .pet-host.collapsed ~ .cards-stack,
      body.cards-collapsed .cards-stack { display: none; }

      /* ---- pet sprite animations(unchanged from v0.4.1)---------------- */
      /* steps(5, jump-none) + to: -4*W is the macOS-26-safe pattern; see
       * v0.4.0 release notes for the long debugging story. */
      .pet.idle    { animation: row-idle    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.wave    { animation: row-wave    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.run     { animation: row-run     var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.failed  { animation: row-failed  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.review  { animation: row-review  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.jump    { animation: row-jump    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.extra1  { animation: row-extra1  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.extra2  { animation: row-extra2  var(--dur, 1100ms) steps(5, jump-none) infinite; }

      @keyframes row-idle    { from { background-position: 0 var(--row-idle-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-idle-y);    } }
      @keyframes row-wave    { from { background-position: 0 var(--row-wave-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-wave-y);    } }
      @keyframes row-run     { from { background-position: 0 var(--row-run-y);     } to { background-position: calc(var(--frame-w) * -4px) var(--row-run-y);     } }
      @keyframes row-failed  { from { background-position: 0 var(--row-failed-y);  } to { background-position: calc(var(--frame-w) * -4px) var(--row-failed-y);  } }
      @keyframes row-review  { from { background-position: 0 var(--row-review-y);  } to { background-position: calc(var(--frame-w) * -4px) var(--row-review-y);  } }
      @keyframes row-jump    { from { background-position: 0 var(--row-jump-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-jump-y);    } }
      @keyframes row-extra1  { from { background-position: 0 var(--row-extra1-y); } to { background-position: calc(var(--frame-w) * -4px) var(--row-extra1-y); } }
      @keyframes row-extra2  { from { background-position: 0 var(--row-extra2-y); } to { background-position: calc(var(--frame-w) * -4px) var(--row-extra2-y); } }
    </style>
  </head>
  <body data-tauri-drag-region>
    <div class="stage" data-tauri-drag-region>
      <!-- v0.6.1 cards stack (row 1, anchors to bottom-right; new cards push up) -->
      <div class="cards-stack" id="cards-stack" data-tauri-drag-region></div>

      <!-- Pet sprite + toggle handle (row 2, bottom-right) -->
      <div class="pet-host" id="pet-host">
        <div class="pet idle" id="pet" data-tauri-drag-region></div>
        <button class="pet-toggle" id="pet-toggle" type="button" title="">
          <svg class="pet-toggle-chevron" viewBox="0 0 12 8" width="11" height="7"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="1.5 1.5, 6 6, 10.5 1.5" />
          </svg>
          <span class="pet-toggle-count" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <script>
      const STATES = ['idle', 'wave', 'run', 'jump', 'review', 'failed', 'extra1', 'extra2'];
      const invoke = window.__TAURI__?.core?.invoke ?? window.__TAURI_INTERNALS__?.invoke;
      const listen = window.__TAURI__?.event?.listen;

      const petHostEl = document.getElementById('pet-host');
      const petEl = document.getElementById('pet');
      const toggleEl = document.getElementById('pet-toggle');
      const toggleCountEl = toggleEl.querySelector('.pet-toggle-count');
      const cardsEl = document.getElementById('cards-stack');
      let currentState = 'idle';

      // v0.6.1 — current sessions snapshot (latest WS push). Map for fast
      // lookup by sessionId; render walks Map.values() ordered by lastEventTs.
      let sessionsBySid = new Map();   // sid → SessionCard
      // Tracks card DOM elements by sid for diff-render.
      const cardEls = new Map();       // sid → HTMLDivElement

      // User-controlled collapsed state, persisted across reloads.
      const COLLAPSED_KEY = 'mavis-pet:collapsed';
      let collapsed = (() => {
        try { return localStorage.getItem(COLLAPSED_KEY) === '1'; } catch { return false; }
      })();

      async function loadPet(slug = null) {
        if (!invoke) { console.error('[mavis-pet] Tauri invoke not available'); return; }
        try {
          const args = slug ? { slug } : {};
          const p = await invoke('get_pet', args);
          const SCALE = 0.3;
          const scaledFrameW = Math.round(p.frame_w * SCALE);
          const scaledFrameH = Math.round(p.frame_h * SCALE);
          console.log('[mavis-pet] pet payload:', {
            slug: p.slug, frame_w: p.frame_w, frame_h: p.frame_h,
            rows: p.rows, cols: p.cols, frame_count: p.frame_count,
            scaled: `${scaledFrameW}x${scaledFrameH}`,
            state_rows: p.state_rows ?? '(default positional)',
          });
          petEl.style.width = `${scaledFrameW}px`;
          petEl.style.height = `${scaledFrameH}px`;
          petEl.style.backgroundImage = `url("data:${p.mime};base64,${p.sprite_b64}")`;
          petEl.style.backgroundSize = `${p.cols * scaledFrameW}px ${p.rows * scaledFrameH}px`;
          petEl.style.setProperty('--frame-w', scaledFrameW);
          petEl.style.setProperty('--frame-h', scaledFrameH);
          petEl.style.setProperty('--cols', p.cols);
          petEl.style.setProperty('--rows', p.rows);
          petEl.style.setProperty('--frames', p.frame_count || 6);
          petEl.style.setProperty('--dur', `${p.frame_duration_ms}ms`);
          // Resolve the row index for each mavis-pet state. When the pet
          // payload carries an explicit `state_rows` map (e.g. petdex pets
          // imported via mavis-pet's adapter — petdex grid order differs
          // from mavis-pet's STATES array order), that map wins. Otherwise
          // we fall back to the implicit "STATES idx == row idx" assumption
          // that mikoko + future native mavis-pet sprites follow.
          const rowMap = p.state_rows && typeof p.state_rows === 'object'
            ? p.state_rows : null;
          STATES.forEach((s, idx) => {
            const row = rowMap && Number.isInteger(rowMap[s]) ? rowMap[s] : idx;
            petEl.style.setProperty(`--row-${s}-y`, `-${row * scaledFrameH}px`);
          });
          console.log(`[mavis-pet] loaded ${p.slug}`);
        } catch (e) {
          console.error('[mavis-pet] loadPet failed:', e);
        }
      }

      function setState(state) {
        if (!STATES.includes(state)) {
          console.warn('[mavis-pet] unknown state:', state); return;
        }
        if (state === currentState) return;
        petEl.classList.remove(currentState);
        petEl.classList.add(state);
        currentState = state;
      }

      // ---- v0.6.1 cards stack rendering ----------------------------------

      function escapeText(s) {
        // textContent assignment auto-escapes; helper is for inline strings.
        return String(s ?? '');
      }

      // v0.6.1 — build a single card's DOM. Returns HTMLDivElement.
      function buildCard(card) {
        const root = document.createElement('div');
        root.className = 'card';
        root.dataset.sid = card.sessionId;

        const row = document.createElement('div');
        row.className = 'card-row';

        // v0.7.2 — restored 22x22 mavis logo badge to the left of title.
        const badge = document.createElement('span');
        badge.className = 'card-badge';
        badge.setAttribute('aria-hidden', 'true');
        row.appendChild(badge);

        const titleEl = document.createElement('span');
        titleEl.className = 'card-title';
        // title preference: real session title > agent display name >
        // fallback "Session <prefix>" so a brand-new session that hasn't
        // resolved its title yet still has SOMETHING to show.
        titleEl.textContent =
          card.title || card.agentName ||
          `Session ${String(card.sessionId).slice(0, 8)}`;
        row.appendChild(titleEl);

        const iconSlot = document.createElement('span');
        iconSlot.className = 'card-icon';
        // Icon precedence: waiting_perm clock > finished check > default spinner.
        const isWaitingPerm = card.currentAction === '等待审批';
        if (isWaitingPerm) {
          iconSlot.innerHTML = `<svg class="card-clock" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5.5"/><line x1="7" y1="7" x2="7" y2="3.5"/><line x1="7" y1="7" x2="9.5" y2="7"/></svg>`;
        } else if (card.status === 'finished') {
          iconSlot.innerHTML = `<svg class="card-check" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 7.5, 6 10, 11 4.5"/></svg>`;
        } else {
          const spin = document.createElement('span');
          spin.className = 'card-spinner';
          iconSlot.appendChild(spin);
        }
        row.appendChild(iconSlot);
        root.appendChild(row);

        // Subtitle: prefer lastMessage (real assistant text) > currentAction
        // (broker stub like "正在思考"). Empty string hides via :empty rule.
        const sub = document.createElement('div');
        sub.className = 'card-subtitle';
        const subtitleText = card.lastMessage || card.currentAction || '';
        // Truncate to 80 chars at JS layer too (broker also truncates,
        // belt + suspenders against any overlong sneaks).
        sub.textContent = subtitleText.length > 80
          ? subtitleText.slice(0, 79) + '…'
          : subtitleText;
        root.appendChild(sub);

        // Class flags for finished / waiting visual states.
        if (card.status === 'finished') root.classList.add('finished');
        if (isWaitingPerm) root.classList.add('waiting-perm');

        // Click → invoke open_session_url (Rust side handles `open` shellout +
        // empty-url → `open -a "MiniMax Test"` focus-only fallback).
        // mousedown stopPropagation prevents the body's start-drag handler
        // from kicking in when clicking a card.
        root.addEventListener('mousedown', (e) => e.stopPropagation());
        root.addEventListener('click', (e) => {
          e.stopPropagation();
          const url = card.deeplink || '';
          if (!invoke) return;
          invoke('open_session_url', { url }).catch((err) => {
            console.warn('[mavis-pet] open_session_url failed:', err);
          });
        });

        return root;
      }

      // v0.6.1 — diff-render cards stack from sessionsBySid map.
      // Already-present cards stay (just data-update); new cards get inserted
      // with .show next tick (so the CSS transition fires); removed cards get
      // .leaving + setTimeout unmount.
      //
      // v0.7.2 — Skip the entire DOM pass when the snapshot is byte-identical
      // to the last render. Multiple concurrent sessions all streaming text
      // cause broker to push 5+ "sessions" messages per second; without this
      // dirty-check every push triggers appendChild on every card (line 487)
      // which forces a layout reflow even when nothing visible changed.
      // Vino reported the cards visibly jittering up/down — that was the
      // 200ms throttle ticks landing as DOM reflows. Now: stringify the
      // ordered cards into a stable key, compare to previous, no-op on match.
      let lastRenderKey = '';
      function renderCards() {
        // v0.7.3 — DO NOT sort here. Broker sends sessions already ordered
        // by firstSeenAt ascending (oldest on top, newest at bottom).
        // Re-sorting on the client by lastEventTs caused position-instability
        // (vino: "弹窗位置一直跳变") because every streaming_text event
        // bumped lastEventTs and made cards swap places.
        const ordered = Array.from(sessionsBySid.values());

        // Build a stable key of the visible state. Include only fields that
        // actually drive the DOM: id, status, currentAction, lastMessage,
        // title, agentName. Exclude lastEventTs (it changes constantly but
        // doesn't change rendering).
        const renderKey = ordered.map(c =>
          `${c.sessionId}|${c.status || ''}|${c.currentAction || ''}|${c.title || ''}|${c.agentName || ''}|${c.lastMessage || ''}`
        ).join('||');
        if (renderKey === lastRenderKey) return;
        lastRenderKey = renderKey;

        const seenSids = new Set();
        // Rebuild DOM in-order (DOM children re-arranged in place by appendChild
        // when the node is already a child — moves rather than copies).
        for (const card of ordered) {
          seenSids.add(card.sessionId);
          let el = cardEls.get(card.sessionId);
          if (!el) {
            el = buildCard(card);
            cardEls.set(card.sessionId, el);
            cardsEl.appendChild(el);
            // Trigger fade-in next frame (avoid initial-render skipping
            // transition because element starts with .show class).
            requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
          } else {
            // Update existing card's content in-place (avoid full rebuild —
            // would lose hover state / ongoing transitions).
            updateCard(el, card);
            // v0.7.2 — Only re-anchor when the DOM order actually differs
            // from the desired order. appendChild on a node already at the
            // right position still triggers reflow, so we skip when noop.
            const desiredIdx = Array.from(seenSids).length - 1;
            const currentIdx = Array.from(cardsEl.children).indexOf(el);
            if (currentIdx !== desiredIdx) {
              cardsEl.appendChild(el);
            }
          }
        }

        // Drop cards no longer in the snapshot (broker evicted them).
        for (const [sid, el] of cardEls.entries()) {
          if (seenSids.has(sid)) continue;
          el.classList.remove('show');
          el.classList.add('leaving');
          cardEls.delete(sid);
          // Keep DOM until transition completes so user sees the fade-out.
          setTimeout(() => {
            try { el.remove(); } catch (_) { /* already gone */ }
          }, 320);
        }

        // Pet-host badge / collapsed-state plumbing.
        const activeCount = sessionsBySid.size;
        if (activeCount > 0) {
          petHostEl.classList.add('has-tasks');
          if (collapsed) {
            petHostEl.classList.add('collapsed');
            toggleCountEl.textContent = activeCount > 99 ? '99+' : String(activeCount);
            toggleEl.title = `${activeCount} active task${activeCount === 1 ? '' : 's'} — click to expand`;
            document.body.classList.add('cards-collapsed');
          } else {
            petHostEl.classList.remove('collapsed');
            toggleCountEl.textContent = '';
            toggleEl.title = 'Click to collapse task cards';
            document.body.classList.remove('cards-collapsed');
          }
        } else {
          petHostEl.classList.remove('has-tasks', 'collapsed');
          document.body.classList.remove('cards-collapsed');
        }
      }

      // v0.6.1 — patch an existing card DOM element with fresh card data.
      function updateCard(el, card) {
        const titleEl = el.querySelector('.card-title');
        const subEl = el.querySelector('.card-subtitle');
        const iconSlot = el.querySelector('.card-icon');

        const newTitle = card.title || card.agentName ||
          `Session ${String(card.sessionId).slice(0, 8)}`;
        if (titleEl.textContent !== newTitle) titleEl.textContent = newTitle;

        const subtitleText = card.lastMessage || card.currentAction || '';
        const truncated = subtitleText.length > 80
          ? subtitleText.slice(0, 79) + '…'
          : subtitleText;
        if (subEl.textContent !== truncated) subEl.textContent = truncated;

        const isWaitingPerm = card.currentAction === '等待审批';
        const isFinished = card.status === 'finished';
        // Re-derive icon (cheap rebuild, three-way switch).
        let iconHtml;
        if (isWaitingPerm) {
          iconHtml = `<svg class="card-clock" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5.5"/><line x1="7" y1="7" x2="7" y2="3.5"/><line x1="7" y1="7" x2="9.5" y2="7"/></svg>`;
        } else if (isFinished) {
          iconHtml = `<svg class="card-check" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 7.5, 6 10, 11 4.5"/></svg>`;
        } else {
          iconHtml = `<span class="card-spinner"></span>`;
        }
        iconSlot.innerHTML = iconHtml;

        el.classList.toggle('finished', isFinished);
        el.classList.toggle('waiting-perm', isWaitingPerm);

        // Refresh stored deeplink reference so click handler uses latest value.
        // (Click handler closes over the original card object passed to
        // buildCard, so we mutate-in-place via a side store on the element.)
        el._card = card;
      }

      // Wire the toggle button.
      toggleEl.addEventListener('click', (e) => {
        e.stopPropagation();
        if (sessionsBySid.size === 0) return;
        collapsed = !collapsed;
        try { localStorage.setItem(COLLAPSED_KEY, collapsed ? '1' : '0'); } catch {}
        renderCards();
      });
      toggleEl.addEventListener('mousedown', (e) => e.stopPropagation());

      // ---- WS client -----------------------------------------------------
      const WS_URL = 'ws://127.0.0.1:7857/ws';
      let ws = null;
      let backoffMs = 500;
      const MAX_BACKOFF = 30000;

      function connect() {
        try { ws = new WebSocket(WS_URL); } catch { scheduleReconnect(); return; }
        ws.onopen = () => { console.log('[mavis-pet] WS connected'); backoffMs = 500; };
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'state' && typeof msg.state === 'string') {
              setState(msg.state);
            } else if (msg.type === 'pet' && typeof msg.slug === 'string') {
              loadPet(msg.slug);
            } else if (msg.type === 'sessions' && Array.isArray(msg.sessions)) {
              // v0.6.1 — replace full sessions snapshot with broker's view.
              sessionsBySid = new Map();
              for (const card of msg.sessions) {
                if (card && typeof card.sessionId === 'string') {
                  sessionsBySid.set(card.sessionId, card);
                }
              }
              renderCards();
            }
          } catch { /* ignore non-JSON */ }
        };
        ws.onclose = () => { ws = null; scheduleReconnect(); };
        ws.onerror = () => { /* onclose follows */ };
      }
      function scheduleReconnect() {
        const wait = Math.min(backoffMs, MAX_BACKOFF);
        backoffMs = Math.min(backoffMs * 2, MAX_BACKOFF);
        setTimeout(connect, wait);
      }

      if (listen) listen('pet-reload', () => loadPet(null));

      window.addEventListener('DOMContentLoaded', () => {
        loadPet(null);
        renderCards();   // initial: nothing to show, but apply collapsed class state
        connect();

        document.body.addEventListener('mousedown', async (e) => {
          if (e.button !== 0) return;
          // Don't start a window drag if the user clicked the toggle button
          // OR a card body (cards have their own click handler that issues
          // open_session_url; dragging would swallow that interaction).
          if (e.target.closest('.pet-toggle')) return;
          if (e.target.closest('.card')) return;
          try {
            const w = window.__TAURI__?.window?.getCurrentWindow?.();
            if (w?.startDragging) {
              await w.startDragging();
            } else if (window.__TAURI_INTERNALS__?.invoke) {
              await window.__TAURI_INTERNALS__.invoke('plugin:window|start_dragging');
            }
          } catch (err) {
            console.error('[mavis-pet] startDragging failed:', err);
          }
        });
      });
    </script>
  </body>
</html>
