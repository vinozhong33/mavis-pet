<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mavis-pet</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0; padding: 0;
        width: 100vw; height: 100vh;
        background: transparent !important;
        overflow: hidden;
        cursor: grab;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
      }
      body:active { cursor: grabbing; }
      .stage {
        position: relative;
        width: 100%; height: 100%;
        background: transparent;
        overflow: hidden;
      }
      /* Pet anchored bottom-RIGHT; bubble floats top-LEFT. */
      .pet {
        position: absolute;
        right: 8px;
        bottom: 4px;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        will-change: background-position;
        pointer-events: auto;
      }

      /* ---- v0.4 task-card bubble --------------------------------------- */
      .bubble {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 240px;
        max-width: calc(100% - 16px);
        background: #ffffff;
        color: #1a1a1a;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 14px;
        /* Soft drop on transparent desktop windows: a wide ambient shadow
         * (e.g. 0 4px 18px) renders as a visible grey rectangular halo on
         * top of the wallpaper because there's no opaque backing to absorb
         * the gradient. Keep it tight, low-alpha, and short-radius. */
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06),
                    0 2px 8px rgba(0, 0, 0, 0.05);
        padding: 8px 10px 10px 10px;
        opacity: 0;
        transform: translateY(-2px);
        pointer-events: none;
        transition: opacity 200ms ease-out, transform 200ms ease-out;
      }
      .bubble.show { opacity: 1; transform: translateY(0); }

      .bubble-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .bubble .badge {
        flex: 0 0 auto;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background-image: url("badge.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin-top: 1px;
      }
      .bubble .title {
        flex: 1 1 auto;
        font-size: 13px;
        line-height: 1.25;
        font-weight: 700;
        letter-spacing: 0.1px;
        color: #1a1a1a;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .bubble .spinner {
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        margin-top: 4px;
        border: 1.5px solid rgba(0, 0, 0, 0.15);
        border-top-color: #1a1a1a;
        border-radius: 50%;
        animation: bubble-spin 0.9s linear infinite;
        opacity: 0;            /* hidden by default; .loading enables */
        transition: opacity 150ms ease-out;
      }
      .bubble.loading .spinner { opacity: 1; }
      @keyframes bubble-spin { to { transform: rotate(360deg); } }

      .bubble .subtitle {
        margin-top: 6px;
        margin-left: 30px;       /* align under title (badge 22 + gap 8) */
        font-size: 12px;
        line-height: 1.35;
        color: #555555;
        font-weight: 400;
        display: -webkit-box;
        -webkit-line-clamp: 2;   /* clamp to 2 lines */
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bubble .subtitle:empty {
        display: none;
        margin: 0;
      }

      /* Compact mode (no subtitle, no spinner) — slimmer card. */
      .bubble.compact {
        padding: 5px 10px 5px 6px;
        width: auto;
        max-width: 220px;
        border-radius: 999px;
      }
      .bubble.compact .subtitle { display: none; }
      .bubble.compact .title {
        font-size: 13px;
        font-weight: 600;
      }

      @media (prefers-color-scheme: dark) {
        .bubble {
          background: #ffffff;   /* keep light on dark wallpapers */
          color: #1a1a1a;
        }
      }

      /* ---- pet animations(unchanged from v0.3.3)---------------------- */
      /* IMPORTANT: petdex sprites are 8 cols × 9 rows but only the first 6
       * frames per row are animation; cols 7-8 are RESERVED transparent
       * padding. CSS pattern below uses `steps(N, jump-none)` + `to: -(N-1)*W`
       * so the keyframe NEVER points at the reserved blank cells, even at
       * `infinite` loop boundaries (where some webviews briefly snap to
       * the `to` value before resetting). Going `to: -N*W` would show a
       * single blank frame on every loop restart. */
      /* ---- pet animations(unchanged from v0.3.3)---------------------- */
      /* IMPORTANT — CSS spec: `steps()` first arg MUST be integer literal,
       * `var()` is rejected at parse time → entire animation-timing-function
       * becomes invalid → falls back to default `ease` (continuous interpolation)
       * → background-position slides continuously through reserved blank cells
       * (col 6,7) on its way to col 5, causing the pet to vanish for fractions
       * of a second. Hardcoding `steps(5, jump-none)` keeps it actually stepped.
       *
       * v0.4 trial — frame_count = 5 (was 6). Boba sprite has variable
       * per-row frame counts; row 3 (jump) is empirically only 5 frames so
       * frame_count=6 displayed a blank frame mid-animation. 5 is the
       * least-common denominator that keeps every row's animation inside
       * its actual sprite cells. Animations on 6+-frame rows lose the
       * 6th frame which is acceptable visual loss. */
      .pet.idle    { animation: row-idle    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.wave    { animation: row-wave    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.run     { animation: row-run     var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.failed  { animation: row-failed  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.review  { animation: row-review  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.jump    { animation: row-jump    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.extra1  { animation: row-extra1  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.extra2  { animation: row-extra2  var(--dur, 1100ms) steps(5, jump-none) infinite; }

      @keyframes row-idle    { from { background-position: 0 var(--row-idle-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-idle-y);    } }
      @keyframes row-wave    { from { background-position: 0 var(--row-wave-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-wave-y);    } }
      @keyframes row-run     { from { background-position: 0 var(--row-run-y);     } to { background-position: calc(var(--frame-w) * -4px) var(--row-run-y);     } }
      @keyframes row-failed  { from { background-position: 0 var(--row-failed-y);  } to { background-position: calc(var(--frame-w) * -4px) var(--row-failed-y);  } }
      @keyframes row-review  { from { background-position: 0 var(--row-review-y);  } to { background-position: calc(var(--frame-w) * -4px) var(--row-review-y);  } }
      @keyframes row-jump    { from { background-position: 0 var(--row-jump-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-jump-y);    } }
      @keyframes row-extra1  { from { background-position: 0 var(--row-extra1-y); } to { background-position: calc(var(--frame-w) * -4px) var(--row-extra1-y); } }
      @keyframes row-extra2  { from { background-position: 0 var(--row-extra2-y); } to { background-position: calc(var(--frame-w) * -4px) var(--row-extra2-y); } }
    </style>
  </head>
  <body data-tauri-drag-region>
    <div class="stage" data-tauri-drag-region>
      <div class="bubble" id="bubble">
        <div class="bubble-row">
          <span class="badge" aria-hidden="true"></span>
          <span class="title" id="bubble-title"></span>
          <span class="spinner" aria-hidden="true"></span>
        </div>
        <div class="subtitle" id="bubble-subtitle"></div>
      </div>
      <div class="pet idle" id="pet" data-tauri-drag-region></div>
    </div>
    <script>
      const STATES = ['idle', 'wave', 'run', 'jump', 'review', 'failed', 'extra1', 'extra2'];
      const invoke = window.__TAURI__?.core?.invoke ?? window.__TAURI_INTERNALS__?.invoke;
      const listen = window.__TAURI__?.event?.listen;

      const petEl = document.getElementById('pet');
      const bubbleEl = document.getElementById('bubble');
      const bubbleTitleEl = document.getElementById('bubble-title');
      const bubbleSubtitleEl = document.getElementById('bubble-subtitle');
      let currentState = 'idle';
      let bubbleHideTimer = null;

      async function loadPet(slug = null) {
        if (!invoke) { console.error('[mavis-pet] Tauri invoke not available'); return; }
        try {
          const args = slug ? { slug } : {};
          const p = await invoke('get_pet', args);
          const SCALE = 0.3;
          const scaledFrameW = Math.round(p.frame_w * SCALE);
          const scaledFrameH = Math.round(p.frame_h * SCALE);
          console.log('[mavis-pet] pet payload:', {
            slug: p.slug, frame_w: p.frame_w, frame_h: p.frame_h,
            rows: p.rows, cols: p.cols, frame_count: p.frame_count,
            scaled: `${scaledFrameW}x${scaledFrameH}`,
          });
          petEl.style.width = `${scaledFrameW}px`;
          petEl.style.height = `${scaledFrameH}px`;
          petEl.style.backgroundImage = `url("data:${p.mime};base64,${p.sprite_b64}")`;
          petEl.style.backgroundSize = `${p.cols * scaledFrameW}px ${p.rows * scaledFrameH}px`;
          petEl.style.setProperty('--frame-w', scaledFrameW);
          petEl.style.setProperty('--frame-h', scaledFrameH);
          petEl.style.setProperty('--cols', p.cols);
          petEl.style.setProperty('--rows', p.rows);
          petEl.style.setProperty('--frames', p.frame_count || 6);
          petEl.style.setProperty('--dur', `${p.frame_duration_ms}ms`);
          STATES.forEach((s, idx) => {
            petEl.style.setProperty(`--row-${s}-y`, `-${idx * scaledFrameH}px`);
          });
          console.log(`[mavis-pet] loaded ${p.slug}`);
        } catch (e) {
          console.error('[mavis-pet] loadPet failed:', e);
        }
      }

      function setState(state) {
        if (!STATES.includes(state)) {
          console.warn('[mavis-pet] unknown state:', state); return;
        }
        if (state === currentState) return;
        petEl.classList.remove(currentState);
        petEl.classList.add(state);
        currentState = state;
      }

      /**
       * v0.4 task-card bubble. Three modes:
       *  - { title, subtitle, loading } → full task card (badge + title + spinner + subtitle)
       *  - { title }                    → card with title only (no subtitle)
       *  - { bubble }                   → legacy compact pill (back-compat)
       *
       * `ttlMs` overrides default 2500ms; pass undefined for sticky (no auto-hide).
       */
      function showBubble(opts) {
        if (!opts) return;
        let title = opts.title || opts.bubble || '';
        let subtitle = opts.subtitle || '';
        const loading = !!opts.loading;
        const compact = !opts.title && !opts.subtitle;   // legacy pill style
        const ttlMs = opts.ttlMs;

        if (!title && !subtitle) return;

        bubbleTitleEl.textContent = title;
        bubbleSubtitleEl.textContent = subtitle;
        bubbleEl.classList.toggle('compact', compact);
        bubbleEl.classList.toggle('loading', loading && !compact);
        bubbleEl.classList.add('show');

        if (bubbleHideTimer) {
          clearTimeout(bubbleHideTimer);
          bubbleHideTimer = null;
        }
        if (typeof ttlMs === 'number' && ttlMs > 0) {
          bubbleHideTimer = setTimeout(() => {
            bubbleEl.classList.remove('show');
            bubbleHideTimer = null;
          }, ttlMs);
        }
        // sticky if ttlMs is undefined / 0
      }

      function hideBubble() {
        bubbleEl.classList.remove('show');
        if (bubbleHideTimer) { clearTimeout(bubbleHideTimer); bubbleHideTimer = null; }
      }

      // ---- WS client -----------------------------------------------------
      const WS_URL = 'ws://127.0.0.1:7857/ws';
      let ws = null;
      let backoffMs = 500;
      const MAX_BACKOFF = 30000;

      function connect() {
        try { ws = new WebSocket(WS_URL); } catch { scheduleReconnect(); return; }
        ws.onopen = () => { console.log('[mavis-pet] WS connected'); backoffMs = 500; };
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'state' && typeof msg.state === 'string') {
              setState(msg.state);
              // v0.4: prefer task-card fields; fall back to legacy `bubble` pill
              if (msg.title || msg.subtitle || msg.bubble) {
                showBubble({
                  title: msg.title,
                  subtitle: msg.subtitle,
                  loading: msg.loading,
                  bubble: msg.bubble,
                  ttlMs: msg.bubbleTtlMs,
                });
              }
            } else if (msg.type === 'pet' && typeof msg.slug === 'string') {
              loadPet(msg.slug);
            } else if (msg.type === 'bubble') {
              // v0.4: standalone bubble nudge (no state change)
              showBubble(msg);
            } else if (msg.type === 'bubble-hide') {
              hideBubble();
            }
          } catch { /* ignore non-JSON */ }
        };
        ws.onclose = () => { ws = null; scheduleReconnect(); };
        ws.onerror = () => { /* onclose follows */ };
      }
      function scheduleReconnect() {
        const wait = Math.min(backoffMs, MAX_BACKOFF);
        backoffMs = Math.min(backoffMs * 2, MAX_BACKOFF);
        setTimeout(connect, wait);
      }

      if (listen) listen('pet-reload', () => loadPet(null));

      window.addEventListener('DOMContentLoaded', () => {
        loadPet(null);
        connect();

        document.body.addEventListener('mousedown', async (e) => {
          if (e.button !== 0) return;
          try {
            const w = window.__TAURI__?.window?.getCurrentWindow?.();
            if (w?.startDragging) {
              await w.startDragging();
            } else if (window.__TAURI_INTERNALS__?.invoke) {
              await window.__TAURI_INTERNALS__.invoke('plugin:window|start_dragging');
            }
          } catch (err) {
            console.error('[mavis-pet] startDragging failed:', err);
          }
        });
      });
    </script>
  </body>
</html>
