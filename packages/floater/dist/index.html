<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mavis-pet</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0; padding: 0;
        width: 100vw; height: 100vh;
        background: transparent !important;
        overflow: hidden;
        cursor: grab;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
      }
      body:active { cursor: grabbing; }
      .stage {
        position: relative;
        width: 100%; height: 100%;
        background: transparent;
        /* IMPORTANT: must be `visible`, not `hidden`. The chevron toggle
         * sits at top:-6 right:-10 relative to .pet-host (overlapping the
         * top-right corner of the pet sprite), which means part of it
         * extends OUTSIDE .pet-host on the top and right. With
         * overflow:hidden the chevron gets clipped to nothing.
         * Sprite frame越界 was the original reason this was hidden;
         * v0.4.1's `steps(5, jump-none)` + `to: -4*W` keeps sprite
         * background-position within bounds, so we no longer need the
         * outer clip. */
        overflow: visible;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 8px;
        padding: 4px 8px 8px 8px;
        box-sizing: border-box;
      }

      /* ---- v0.4.2 layout: boba TOP-RIGHT, card RIGHT BELOW (replaces v0.4 left/right split) ---- */

      /* Pet container: holds the sprite + the toggle (chevron / badge).
       * In row 1, right-aligned (justify-self: end).  pet sprite + toggle
       * are positioned within. */
      .pet-host {
        position: relative;
        justify-self: end;
        align-self: start;
        width: auto;
        height: auto;
      }
      .pet {
        position: relative;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        will-change: background-position;
        pointer-events: auto;
      }

      /* Toggle handle in pet's top-right corner. Two skins switched by
       * .collapsed class on .pet-host:
       *   - collapsed=false  →  small ⌄ chevron (means "click to collapse")
       *   - collapsed=true   →  pale-blue ① badge (means "N tasks; click to expand")
       * Hidden entirely when there are no active sessions. */
      .pet-toggle {
        position: absolute;
        /* Anchor to pet's top-right corner with slight outward offset so
         * the badge half-overlaps the sprite (visually attached to it
         * rather than floating loose). Requires .stage to have
         * overflow:visible (or the negative offsets get clipped). */
        top: -4px;
        right: -4px;
        width: 22px;
        min-width: 22px;
        height: 22px;
        padding: 0;
        border-radius: 11px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        background: #ffffff;
        color: #333333;
        border: none;
        /* Soft drop on transparent desktop windows: same recipe as the
         * task card — wide shadow with high alpha (e.g. 0 2px 6px α0.18)
         * renders as a visible grey halo on the wallpaper. Stay tight,
         * low-alpha, and use a hairline ring to define the edge. */
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06),
                    0 2px 6px rgba(0, 0, 0, 0.05),
                    0 0 0 0.5px rgba(0, 0, 0, 0.08);
        cursor: pointer;
        pointer-events: auto;
        z-index: 10;
        transition: background 120ms ease-out, transform 120ms ease-out;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      }
      .pet-toggle:hover { background: #f3f6fb; transform: scale(1.05); }
      .pet-toggle:active { transform: scale(0.92); }
      .pet-host.has-tasks .pet-toggle { display: inline-flex; }
      /* Chevron (expanded state) vs count (collapsed state) — only one
       * shown at a time, controlled by .pet-host.collapsed class. SVG path
       * guaranteed to render as a real ∨ shape regardless of system font
       * (the previous `⌄` U+2304 character fell back to plain "v" letter
       * in macOS WebView). */
      .pet-toggle .pet-toggle-chevron { display: block; }
      .pet-toggle .pet-toggle-count { display: none; font-size: 12px; font-weight: 600; line-height: 1; }
      .pet-host.collapsed .pet-toggle .pet-toggle-chevron { display: none; }
      .pet-host.collapsed .pet-toggle .pet-toggle-count { display: inline; }
      .pet-host.collapsed .pet-toggle {
        background: #4a90e2;
        color: #ffffff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08),
                    0 2px 6px rgba(74, 144, 226, 0.18),
                    0 0 0 0.5px rgba(255, 255, 255, 0.4) inset;
      }
      .pet-host.collapsed .pet-toggle:hover { background: #3a7fd0; }

      /* ---- Task card (row 2, naturally below the pet via grid layout) ---- */
      .bubble {
        align-self: start;       /* hug top of row 2 — i.e. right under the pet */
        background: #ffffff;
        color: #1a1a1a;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 14px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06),
                    0 2px 8px rgba(0, 0, 0, 0.05);
        padding: 8px 10px 10px 10px;
        opacity: 0;
        transform: translateY(2px);
        pointer-events: none;
        transition: opacity 180ms ease-out, transform 180ms ease-out;
        width: 100%;
        box-sizing: border-box;
      }
      .bubble.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
      .bubble.hidden { display: none !important; }

      .bubble-row {
        display: flex;
        /* v0.4.2 (2/4): centerline-align badge ↔ title ↔ spinner/clock so
         * the 22x22 badge midpoint sits on the title text midpoint. The
         * old `flex-start` + per-element `margin-top` hacks (badge 1px,
         * spinner 4px) were eyeballed offsets that drifted as soon as
         * the title font size or row height changed. */
        align-items: center;
        gap: 8px;
      }
      .bubble .badge {
        flex: 0 0 auto;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background-image: url("badge.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .bubble .title {
        flex: 1 1 auto;
        font-size: 13px;
        line-height: 1.25;
        font-weight: 700;
        letter-spacing: 0.1px;
        color: #1a1a1a;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .bubble .spinner {
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        border: 1.5px solid rgba(0, 0, 0, 0.15);
        border-top-color: #1a1a1a;
        border-radius: 50%;
        animation: bubble-spin 0.9s linear infinite;
        opacity: 0;
        transition: opacity 150ms ease-out;
      }
      .bubble.loading .spinner { opacity: 1; }
      @keyframes bubble-spin { to { transform: rotate(360deg); } }

      /* v0.4.2 (2/4): clock icon — shown when broker reports
       * waiting:true (i.e. blocked on user authorization / approval).
       * Semantically distinct from `loading` (which means "agent is
       * actively working"). The two are mutually exclusive at the
       * visual layer: when .bubble.waiting is set the spinner is
       * forced opacity:0 even if .bubble.loading is also present
       * (later rule wins on equal specificity). JS keeps the loading
       * class untouched and only toggles `waiting`. */
      .bubble .clock {
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        opacity: 0;
        transition: opacity 150ms ease-out;
        display: block;
      }
      .bubble.waiting .clock { opacity: 1; }
      .bubble.waiting .spinner { opacity: 0; }

      .bubble .subtitle {
        margin-top: 2px;
        margin-left: 0;
        font-size: 12px;
        line-height: 1.35;
        color: #555555;
        font-weight: 400;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bubble .subtitle:empty { display: none; margin: 0; }

      .bubble.compact {
        padding: 5px 10px 5px 6px;
        max-width: 220px;
        border-radius: 999px;
      }
      .bubble.compact .subtitle { display: none; }
      .bubble.compact .title { font-size: 13px; font-weight: 600; }

      @media (prefers-color-scheme: dark) {
        .bubble { background: #ffffff; color: #1a1a1a; }
      }

      /* ---- pet sprite animations(unchanged from v0.4.1)---------------- */
      /* steps(5, jump-none) + to: -4*W is the macOS-26-safe pattern; see
       * v0.4.0 release notes for the long debugging story. */
      .pet.idle    { animation: row-idle    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.wave    { animation: row-wave    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.run     { animation: row-run     var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.failed  { animation: row-failed  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.review  { animation: row-review  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.jump    { animation: row-jump    var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.extra1  { animation: row-extra1  var(--dur, 1100ms) steps(5, jump-none) infinite; }
      .pet.extra2  { animation: row-extra2  var(--dur, 1100ms) steps(5, jump-none) infinite; }

      @keyframes row-idle    { from { background-position: 0 var(--row-idle-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-idle-y);    } }
      @keyframes row-wave    { from { background-position: 0 var(--row-wave-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-wave-y);    } }
      @keyframes row-run     { from { background-position: 0 var(--row-run-y);     } to { background-position: calc(var(--frame-w) * -4px) var(--row-run-y);     } }
      @keyframes row-failed  { from { background-position: 0 var(--row-failed-y);  } to { background-position: calc(var(--frame-w) * -4px) var(--row-failed-y);  } }
      @keyframes row-review  { from { background-position: 0 var(--row-review-y);  } to { background-position: calc(var(--frame-w) * -4px) var(--row-review-y);  } }
      @keyframes row-jump    { from { background-position: 0 var(--row-jump-y);    } to { background-position: calc(var(--frame-w) * -4px) var(--row-jump-y);    } }
      @keyframes row-extra1  { from { background-position: 0 var(--row-extra1-y); } to { background-position: calc(var(--frame-w) * -4px) var(--row-extra1-y); } }
      @keyframes row-extra2  { from { background-position: 0 var(--row-extra2-y); } to { background-position: calc(var(--frame-w) * -4px) var(--row-extra2-y); } }
    </style>
  </head>
  <body data-tauri-drag-region>
    <div class="stage" data-tauri-drag-region>
      <!-- Pet sprite + toggle handle (top-right) -->
      <div class="pet-host" id="pet-host">
        <div class="pet idle" id="pet" data-tauri-drag-region></div>
        <button class="pet-toggle" id="pet-toggle" type="button" title="">
          <svg class="pet-toggle-chevron" viewBox="0 0 12 8" width="11" height="7"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="1.5 1.5, 6 6, 10.5 1.5" />
          </svg>
          <span class="pet-toggle-count" aria-hidden="true"></span>
        </button>
      </div>

      <!-- Task card (below pet) -->
      <div class="bubble" id="bubble">
        <div class="bubble-row">
          <span class="badge" aria-hidden="true"></span>
          <span class="title" id="bubble-title"></span>
          <span class="spinner" aria-hidden="true"></span>
          <!-- Clock icon — visible iff .bubble.waiting (broker reported
               waiting:true, i.e. blocked on user authorization). 14x14
               viewBox; circle outline (#999, grey) + 12 o'clock hour hand
               (#f5a623, orange — visually pops to draw attention) +
               9 o'clock minute hand (#999, grey). Hour hand is shorter
               than the minute hand by convention so the icon reads as
               a clock face rather than a plus sign. -->
          <svg class="clock" viewBox="0 0 14 14" width="14" height="14"
               fill="none" stroke-width="1.3" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <circle cx="7" cy="7" r="5.5" stroke="#999999" />
            <line x1="7" y1="7" x2="7" y2="3.5" stroke="#f5a623" />
            <line x1="7" y1="7" x2="3.5" y2="7" stroke="#999999" />
          </svg>
        </div>
        <div class="subtitle" id="bubble-subtitle"></div>
      </div>
    </div>
    <script>
      const STATES = ['idle', 'wave', 'run', 'jump', 'review', 'failed', 'extra1', 'extra2'];
      const invoke = window.__TAURI__?.core?.invoke ?? window.__TAURI_INTERNALS__?.invoke;
      const listen = window.__TAURI__?.event?.listen;

      const petHostEl = document.getElementById('pet-host');
      const petEl = document.getElementById('pet');
      const toggleEl = document.getElementById('pet-toggle');
      const toggleCountEl = toggleEl.querySelector('.pet-toggle-count');
      const bubbleEl = document.getElementById('bubble');
      const bubbleTitleEl = document.getElementById('bubble-title');
      const bubbleSubtitleEl = document.getElementById('bubble-subtitle');
      let currentState = 'idle';
      let bubbleHideTimer = null;

      // Latest task-card payload from broker (cache for show/hide on toggle).
      let lastCard = null;       // { title, subtitle, loading, waiting } | null
      let activeCount = 0;       // Number of active mavis sessions

      // User-controlled collapsed state, persisted across reloads.
      const COLLAPSED_KEY = 'mavis-pet:collapsed';
      let collapsed = (() => {
        try { return localStorage.getItem(COLLAPSED_KEY) === '1'; } catch { return false; }
      })();

      async function loadPet(slug = null) {
        if (!invoke) { console.error('[mavis-pet] Tauri invoke not available'); return; }
        try {
          const args = slug ? { slug } : {};
          const p = await invoke('get_pet', args);
          const SCALE = 0.3;
          const scaledFrameW = Math.round(p.frame_w * SCALE);
          const scaledFrameH = Math.round(p.frame_h * SCALE);
          console.log('[mavis-pet] pet payload:', {
            slug: p.slug, frame_w: p.frame_w, frame_h: p.frame_h,
            rows: p.rows, cols: p.cols, frame_count: p.frame_count,
            scaled: `${scaledFrameW}x${scaledFrameH}`,
          });
          petEl.style.width = `${scaledFrameW}px`;
          petEl.style.height = `${scaledFrameH}px`;
          petEl.style.backgroundImage = `url("data:${p.mime};base64,${p.sprite_b64}")`;
          petEl.style.backgroundSize = `${p.cols * scaledFrameW}px ${p.rows * scaledFrameH}px`;
          petEl.style.setProperty('--frame-w', scaledFrameW);
          petEl.style.setProperty('--frame-h', scaledFrameH);
          petEl.style.setProperty('--cols', p.cols);
          petEl.style.setProperty('--rows', p.rows);
          petEl.style.setProperty('--frames', p.frame_count || 6);
          petEl.style.setProperty('--dur', `${p.frame_duration_ms}ms`);
          STATES.forEach((s, idx) => {
            petEl.style.setProperty(`--row-${s}-y`, `-${idx * scaledFrameH}px`);
          });
          console.log(`[mavis-pet] loaded ${p.slug}`);
        } catch (e) {
          console.error('[mavis-pet] loadPet failed:', e);
        }
      }

      function setState(state) {
        if (!STATES.includes(state)) {
          console.warn('[mavis-pet] unknown state:', state); return;
        }
        if (state === currentState) return;
        petEl.classList.remove(currentState);
        petEl.classList.add(state);
        currentState = state;
      }

      // ---- Card rendering -------------------------------------------------
      // The card is a singleton always-on display (v0.4.2). Visibility rules:
      //   - activeCount == 0           → hidden (no tasks)
      //   - collapsed == true          → hidden (user folded)
      //   - else                       → shown with lastCard contents
      function renderUi() {
        // Toggle visibility of the toggle handle + its skin.
        if (activeCount > 0) {
          petHostEl.classList.add('has-tasks');
          if (collapsed) {
            petHostEl.classList.add('collapsed');
            toggleCountEl.textContent = activeCount > 99 ? '99+' : String(activeCount);
            toggleEl.title = `${activeCount} active task${activeCount === 1 ? '' : 's'} — click to expand`;
          } else {
            petHostEl.classList.remove('collapsed');
            toggleCountEl.textContent = '';
            toggleEl.title = 'Click to collapse task card';
          }
        } else {
          petHostEl.classList.remove('has-tasks', 'collapsed');
        }

        // Card visibility.
        const shouldShowCard = activeCount > 0 && !collapsed && lastCard;
        if (!shouldShowCard) {
          bubbleEl.classList.remove('show');
          return;
        }
        bubbleTitleEl.textContent = lastCard.title || '';
        bubbleSubtitleEl.textContent = lastCard.subtitle || '';
        bubbleEl.classList.toggle('compact', false);
        bubbleEl.classList.toggle('loading', !!lastCard.loading);
        // v0.4.2 (2/4): waiting trumps loading visually (CSS rule order
        // ensures spinner hides when waiting is on). We still leave the
        // `loading` class as-is so semantics survive a waiting→done flip.
        bubbleEl.classList.toggle('waiting', !!lastCard.waiting);
        bubbleEl.classList.add('show');
      }

      // Legacy compact-pill bubble path — used by the old WS protocol when only
      // `bubble` is set (no `title`). Auto-dismisses after ttlMs.
      function showLegacyBubble(opts) {
        if (!opts || !opts.bubble) return;
        bubbleTitleEl.textContent = opts.bubble;
        bubbleSubtitleEl.textContent = '';
        bubbleEl.classList.add('compact', 'show');
        bubbleEl.classList.remove('loading', 'waiting');
        if (bubbleHideTimer) { clearTimeout(bubbleHideTimer); bubbleHideTimer = null; }
        const ttlMs = opts.ttlMs ?? 2500;
        if (ttlMs > 0) {
          bubbleHideTimer = setTimeout(() => {
            bubbleEl.classList.remove('show');
            bubbleHideTimer = null;
          }, ttlMs);
        }
      }

      // Wire the toggle button.
      toggleEl.addEventListener('click', (e) => {
        e.stopPropagation();
        // Don't toggle if there's nothing to show.
        if (activeCount === 0) return;
        collapsed = !collapsed;
        try { localStorage.setItem(COLLAPSED_KEY, collapsed ? '1' : '0'); } catch {}
        renderUi();
      });
      // Prevent the click from also dragging the window.
      toggleEl.addEventListener('mousedown', (e) => e.stopPropagation());

      // ---- WS client -----------------------------------------------------
      const WS_URL = 'ws://127.0.0.1:7857/ws';
      let ws = null;
      let backoffMs = 500;
      const MAX_BACKOFF = 30000;

      function connect() {
        try { ws = new WebSocket(WS_URL); } catch { scheduleReconnect(); return; }
        ws.onopen = () => { console.log('[mavis-pet] WS connected'); backoffMs = 500; };
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'state' && typeof msg.state === 'string') {
              setState(msg.state);

              // v0.4.2 — track active session count if present.
              if (typeof msg.activeSessionCount === 'number') {
                activeCount = Math.max(0, msg.activeSessionCount);
              }

              // Card data: only update lastCard if title is actually set.
              // Empty title with activeCount > 0 means "we're tracking N
              // sessions but don't have title data yet" — keep showing
              // whatever we had.
              if (msg.title || msg.subtitle) {
                lastCard = {
                  title: msg.title || '',
                  subtitle: msg.subtitle || '',
                  loading: !!msg.loading,
                  waiting: !!msg.waiting,
                };
              } else if (msg.title === '' && msg.subtitle === '' && activeCount === 0) {
                // Explicit clear (no active session).
                lastCard = null;
              }
              renderUi();

              // Legacy fallback: only `bubble` set (old protocol).
              if (msg.bubble && !msg.title) {
                showLegacyBubble({ bubble: msg.bubble, ttlMs: msg.bubbleTtlMs });
              }
            } else if (msg.type === 'pet' && typeof msg.slug === 'string') {
              loadPet(msg.slug);
            } else if (msg.type === 'bubble') {
              showLegacyBubble(msg);
            } else if (msg.type === 'bubble-hide') {
              bubbleEl.classList.remove('show');
              if (bubbleHideTimer) { clearTimeout(bubbleHideTimer); bubbleHideTimer = null; }
            }
          } catch { /* ignore non-JSON */ }
        };
        ws.onclose = () => { ws = null; scheduleReconnect(); };
        ws.onerror = () => { /* onclose follows */ };
      }
      function scheduleReconnect() {
        const wait = Math.min(backoffMs, MAX_BACKOFF);
        backoffMs = Math.min(backoffMs * 2, MAX_BACKOFF);
        setTimeout(connect, wait);
      }

      if (listen) listen('pet-reload', () => loadPet(null));

      window.addEventListener('DOMContentLoaded', () => {
        loadPet(null);
        renderUi();   // initial: nothing to show, but apply collapsed class state
        connect();

        document.body.addEventListener('mousedown', async (e) => {
          if (e.button !== 0) return;
          // Don't start a window drag if the user clicked the toggle button.
          if (e.target.closest('.pet-toggle')) return;
          try {
            const w = window.__TAURI__?.window?.getCurrentWindow?.();
            if (w?.startDragging) {
              await w.startDragging();
            } else if (window.__TAURI_INTERNALS__?.invoke) {
              await window.__TAURI_INTERNALS__.invoke('plugin:window|start_dragging');
            }
          } catch (err) {
            console.error('[mavis-pet] startDragging failed:', err);
          }
        });
      });
    </script>
  </body>
</html>
