[package]
name = "mavis-pet-floater"
version = "0.1.0"
edition = "2021"
description = "Mavis Pet desktop floater — transparent always-on-top sprite with WS-driven animation states"
publish = false

[lib]
name = "mavis_pet_floater_lib"
path = "src/lib.rs"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "mavis-pet-floater"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# macos-private-api is REQUIRED for transparent window on macOS.
tauri = { version = "2", features = ["macos-private-api"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
dirs = "5"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
