[package]
name = "mavis-pet-floater"
version = "0.1.0"
edition = "2021"
description = "Mavis Pet desktop floater — transparent always-on-top sprite with WS-driven animation states"
publish = false

[lib]
name = "mavis_pet_floater_lib"
path = "src/lib.rs"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "mavis-pet-floater"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# macos-private-api is REQUIRED for transparent window on macOS.
tauri = { version = "2", features = ["macos-private-api"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
dirs = "5"
# v0.7.6 — global cursor position polling (top-left coords, physical px),
# used for the click-through hit-region polling task. Cross-platform but
# we only enable the macOS path; lightweight (no proc-macro).
mouse_position = "0.1"

# macOS native APIs to lift the floater above other apps' fullscreen Spaces.
# v0.4.1 — switched primary mechanism from raw cocoa NSWindow tweaks to
# tauri-nspanel: macOS 26 stopped honoring NSWindowCollectionBehaviorFullScreenAuxiliary
# on plain NSWindow subclasses; only NSPanel subclasses survive fullscreen
# transitions now (verified by BongoCat 20.8k⭐ desktop pet on macOS 26).
# tauri-nspanel uses object_setClass to swizzle Tauri's default NSWindow
# into an NSPanel subclass with NonactivatingPanel mask, which is the
# only macOS-26-compatible path. cocoa/objc kept for the activationPolicy
# Accessory call; ManagerExt + WebviewWindowExt drive the panel.
[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.26"
objc = "0.2"
tauri-nspanel = { git = "https://github.com/ahkohd/tauri-nspanel", branch = "v2.1" }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
